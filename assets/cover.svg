<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a" />
      <stop offset="100%" stop-color="#1e1e2f" />
    </linearGradient>
    
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fc4c02" />
      <stop offset="100%" stop-color="#ff7b3f" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <clipPath id="logo-clip">
      <rect x="0" y="0" width="64" height="64" rx="16" />
    </clipPath>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)" />
  
  <path d="M -10 380 C 150 380, 250 280, 350 330 C 450 380, 550 180, 650 230 C 750 280, 850 80, 950 130 C 1050 180, 1200 30, 1200 30 L 1250 650 L -10 650 Z" fill="#fc4c02" opacity="0.1" />
  <path d="M -10 380 C 150 380, 250 280, 350 330 C 450 380, 550 180, 650 230 C 750 280, 850 80, 950 130 C 1050 180, 1200 30, 1200 30" fill="none" stroke="url(#orangeGlow)" stroke-width="6" stroke-linecap="round" />
  
  <rect x="620" y="140" width="530" height="320" rx="10" fill="#0d0d12" stroke="#333" stroke-width="2" filter="url(#shadow)" />
  
  <circle cx="645" cy="165" r="6" fill="#ff5f56" />
  <circle cx="665" cy="165" r="6" fill="#ffbd2e" />
  <circle cx="685" cy="165" r="6" fill="#27c93f" />
  <line x1="620" y1="190" x2="1150" y2="190" stroke="#333" stroke-width="2" />
  
  <text x="650" y="230" font-family="monospace" font-size="16" fill="#a0a0b0">> claude /analyse</text>
  <text x="650" y="270" font-family="monospace" font-size="16" fill="#cc99ff">Analysing Strava workout: "Morning Vo2 Max"...</text>
  <text x="650" y="310" font-family="monospace" font-size="16" fill="#4ade80">✓ IF: 0.92 | TSS: 85 | NP: 295w</text>
  <text x="650" y="350" font-family="monospace" font-size="16" fill="#e2e8f0">Coach: Great execution on the 5-min intervals.</text>
  <text x="650" y="380" font-family="monospace" font-size="16" fill="#e2e8f0">I've scheduled an active recovery ride for </text>
  <text x="650" y="410" font-family="monospace" font-size="16" fill="#e2e8f0">tomorrow in your Google Calendar.</text>
  
  <text x="70" y="240" font-family="sans-serif" font-weight="bold" font-size="56" fill="#ffffff">Claude Coached</text>
  
  <text x="70" y="300" font-family="sans-serif" font-size="24" fill="#a0a0b0">Your AI cycling coach,</text>
  <text x="70" y="340" font-family="sans-serif" font-size="24" fill="#a0a0b0">powered by Claude Code.</text>
  
  <g transform="translate(70, 420)" filter="url(#shadow)">
    <image href="strava.png" width="64" height="64" clip-path="url(#logo-clip)" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="64" height="64" rx="16" fill="none" stroke="#444" stroke-width="2"/>
  </g>

  <g transform="translate(154, 420)" filter="url(#shadow)">
    <image href="calendar.png" width="64" height="64" clip-path="url(#logo-clip)" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="64" height="64" rx="16" fill="none" stroke="#444" stroke-width="2"/>
  </g>

  <g transform="translate(238, 420)" filter="url(#shadow)">
    <image href="claude.png" width="64" height="64" clip-path="url(#logo-clip)" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="64" height="64" rx="16" fill="none" stroke="#444" stroke-width="2"/>
  </g>
  
</svg>
